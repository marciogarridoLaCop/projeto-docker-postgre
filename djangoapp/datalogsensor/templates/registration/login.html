<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Monitoramento de Sensores</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #111217; color: #d8d9da;
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .box {
      background: #181b24; border: 1px solid #262a36; border-radius: 8px;
      padding: 32px; width: 320px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { color: #8e8e8e; font-size: 13px; margin: 0 0 24px; }
    label { display: block; font-size: 12px; color: #8e8e8e; margin: 14px 0 6px; }
    input {
      width: 100%; box-sizing: border-box; background: #0e1015; color: #d8d9da;
      border: 1px solid #262a36; border-radius: 4px; padding: 9px 11px; font-size: 14px;
    }
    button {
      width: 100%; margin-top: 22px; background: #3d71d9; color: #fff; border: none;
      border-radius: 4px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #3463bf; }
    .erro { color: #e0664f; font-size: 13px; margin-top: 14px; }
  </style>
</head>
<body>
  <form class="box" method="post">
    {% csrf_token %}
    <h1>📡 Monitoramento</h1>
    <p class="sub">Entre com sua conta para ver seus sensores.</p>

    <label for="id_username">Usuário</label>
    {{ form.username }}
    <label for="id_password">Senha</label>
    {{ form.password }}

    {% if form.errors %}
      <div class="erro">Usuário ou senha inválidos.</div>
    {% endif %}

    <button type="submit">Entrar</button>
  </form>
</body>
</html>
